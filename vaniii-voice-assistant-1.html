<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Vaniii — Voice Assistant</title>
<style>
  :root {
    --bg: #131316;
    --bg-soft: #1B1B20;
    --panel: #1E1E24;
    --border: #2C2C34;
    --text: #F2F0F7;
    --text-dim: #8B899A;
    --accent: #6C5CE7;
    --accent-soft: #6C5CE733;
    --accent-glow: #8B7FFF;
    --listen: #4FD1E8;
    --speak: #6C5CE7;
    --danger: #E85D5D;
    --mono: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    overscroll-behavior: none;
  }

  body {
    display: flex;
    flex-direction: column;
    max-width: 480px;
    width: 100%;
    margin: 0 auto;
    height: 100vh;
    height: 100dvh;
    position: relative;
    overflow: hidden;
    background:
      radial-gradient(ellipse 500px 300px at 50% 0%, var(--accent-soft), transparent),
      var(--bg);
  }

  /* ---------- Header ---------- */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 20px 12px;
    flex-shrink: 0;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .brand-mark {
    width: 30px; height: 30px;
    border-radius: 9px;
    background: linear-gradient(135deg, var(--accent), var(--listen));
    display: flex; align-items: center; justify-content: center;
    font-weight: 800;
    font-size: 15px;
    color: #0B0B0D;
    flex-shrink: 0;
  }
  .brand-text {
    font-size: 17px;
    font-weight: 800;
    letter-spacing: 0.2px;
  }
  .brand-text span {
    color: var(--accent-glow);
  }
  .status-chip {
    font-size: 10.5px;
    font-weight: 700;
    letter-spacing: 0.6px;
    text-transform: uppercase;
    padding: 5px 10px;
    border-radius: 20px;
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
  }
  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--text-dim);
    transition: background 0.3s ease, box-shadow 0.3s ease;
  }
  .status-chip.ready .status-dot { background: #5FE0A0; box-shadow: 0 0 6px #5FE0A0; }
  .status-chip.listening .status-dot { background: var(--listen); box-shadow: 0 0 6px var(--listen); }
  .status-chip.thinking .status-dot { background: #F2C94C; box-shadow: 0 0 6px #F2C94C; }
  .status-chip.speaking .status-dot { background: var(--accent-glow); box-shadow: 0 0 6px var(--accent-glow); }

  /* ---------- Orb ---------- */
  .orb-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 18px 20px 10px;
    flex-shrink: 0;
  }
  .orb-stage {
    position: relative;
    width: 168px; height: 168px;
    display: flex; align-items: center; justify-content: center;
  }
  .ring {
    position: absolute;
    border-radius: 50%;
    border: 1.5px solid var(--accent);
    opacity: 0;
  }
  .ring1 { width: 100%; height: 100%; }
  .ring2 { width: 82%; height: 82%; }
  .orb {
    position: relative;
    width: 108px; height: 108px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, var(--accent-glow), var(--accent) 55%, #4A3FC7 100%);
    box-shadow:
      0 0 30px 4px var(--accent-soft),
      inset 0 0 20px rgba(255,255,255,0.15);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: transform 0.15s ease;
    border: none;
    touch-action: manipulation;
  }
  .orb:active { transform: scale(0.96); }
  .orb svg { width: 40px; height: 40px; }

  .orb-stage.listening .orb {
    animation: breathe 1.1s ease-in-out infinite;
    background: radial-gradient(circle at 35% 30%, #7FEFFF, var(--listen) 55%, #2FA8C2 100%);
    box-shadow: 0 0 40px 8px #4FD1E855, inset 0 0 20px rgba(255,255,255,0.2);
  }
  .orb-stage.listening .ring {
    border-color: var(--listen);
    animation: pulse-ring 1.6s ease-out infinite;
  }
  .orb-stage.listening .ring2 { animation-delay: 0.4s; }

  .orb-stage.thinking .orb {
    animation: spin-glow 1.4s linear infinite;
    background: radial-gradient(circle at 35% 30%, #FFE9A8, #F2C94C 55%, #C9971F 100%);
    box-shadow: 0 0 40px 8px #F2C94C44, inset 0 0 20px rgba(255,255,255,0.2);
  }

  .orb-stage.speaking .orb {
    animation: talk-bounce 0.5s ease-in-out infinite;
  }
  .orb-stage.speaking .ring {
    border-color: var(--accent-glow);
    animation: pulse-ring 1s ease-out infinite;
  }

  @keyframes breathe {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.08); }
  }
  @keyframes pulse-ring {
    0% { transform: scale(0.75); opacity: 0.8; }
    100% { transform: scale(1.15); opacity: 0; }
  }
  @keyframes spin-glow {
    0% { transform: rotate(0deg) scale(1); }
    50% { transform: rotate(180deg) scale(1.05); }
    100% { transform: rotate(360deg) scale(1); }
  }
  @keyframes talk-bounce {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }

  .orb-hint {
    margin-top: 14px;
    font-size: 12.5px;
    color: var(--text-dim);
    font-weight: 600;
    letter-spacing: 0.2px;
    text-align: center;
    min-height: 16px;
  }

  /* ---------- Transcript log ---------- */
  main {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    padding: 6px 16px 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    -webkit-overflow-scrolling: touch;
  }
  main::-webkit-scrollbar { width: 4px; }
  main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .empty-state {
    margin: auto;
    text-align: center;
    color: var(--text-dim);
    font-size: 13px;
    padding: 30px 20px;
    line-height: 1.6;
  }
  .empty-state b { color: var(--text); }

  .bubble {
    max-width: 86%;
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.45;
    animation: rise 0.25s ease;
  }
  @keyframes rise {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .bubble.user {
    align-self: flex-end;
    background: var(--accent);
    color: #fff;
    border-bottom-right-radius: 4px;
  }
  .bubble.assistant {
    align-self: flex-start;
    background: var(--panel);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }
  .bubble.system {
    align-self: center;
    background: transparent;
    color: var(--text-dim);
    font-size: 11.5px;
    font-family: var(--mono);
    text-align: center;
    padding: 4px 10px;
  }
  .bubble .label {
    display: block;
    font-size: 9.5px;
    font-weight: 800;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    margin-bottom: 3px;
    opacity: 0.6;
  }

  /* ---------- Controls ---------- */
  .controls {
    padding: 10px 16px calc(14px + env(safe-area-inset-bottom));
    border-top: 1px solid var(--border);
    background: var(--bg-soft);
    display: flex;
    flex-direction: column;
    gap: 10px;
    flex-shrink: 1;
    min-height: 0;
    overflow-y: auto;
  }
  .quick-row {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 2px;
  }
  .quick-row::-webkit-scrollbar { display: none; }
  .chip-btn {
    flex-shrink: 0;
    font-size: 11.5px;
    font-weight: 600;
    padding: 7px 12px;
    border-radius: 20px;
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text-dim);
    cursor: pointer;
    white-space: nowrap;
  }
  .chip-btn:active { background: var(--border); }

  .text-row {
    display: flex;
    gap: 8px;
    align-items: center;
    min-width: 0;
  }
  .text-input {
    flex: 1 1 auto;
    min-width: 0;
    width: 100%;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 22px;
    padding: 11px 16px;
    color: var(--text);
    font-size: 14.5px;
    font-family: var(--sans);
    outline: none;
  }
  .text-input:focus { border-color: var(--accent); }
  .icon-btn {
    flex-shrink: 0;
    width: 42px; height: 42px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--text);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
  }
  .icon-btn svg { width: 18px; height: 18px; }
  .icon-btn.send { background: var(--accent); border-color: var(--accent); }
  .icon-btn.mute.active { background: var(--danger); border-color: var(--danger); }
  .icon-btn:active { transform: scale(0.94); }

  .settings-toggle {
    text-align: center;
    font-size: 10.5px;
    color: var(--text-dim);
    letter-spacing: 0.4px;
    cursor: pointer;
    padding-top: 2px;
  }

  /* ---------- Settings panel ---------- */
  .settings-panel {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease;
  }
  .settings-panel.open { max-height: 220px; }
  .settings-inner {
    padding: 12px 4px 4px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .setting-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 12.5px;
    color: var(--text-dim);
  }
  .setting-row select {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 6px 8px;
    font-size: 12px;
    max-width: 200px;
  }
  .setting-row input[type="range"] {
    width: 120px;
    accent-color: var(--accent);
  }

  /* ---------- Toast (errors) ---------- */
  .toast {
    position: fixed;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: var(--danger);
    color: #fff;
    padding: 10px 16px;
    border-radius: 10px;
    font-size: 12.5px;
    font-weight: 600;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease, transform 0.25s ease;
    max-width: 85%;
    text-align: center;
    z-index: 50;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  @media (max-width: 360px) {
    .orb-stage { width: 140px; height: 140px; }
    .orb { width: 92px; height: 92px; }
  }

  /* Short viewports (landscape phones): shrink the orb area so
     header + controls stay on-screen and main just scrolls. */
  @media (max-height: 480px) {
    .orb-wrap { padding: 10px 20px 6px; }
    .orb-stage { width: 96px; height: 96px; }
    .orb { width: 64px; height: 64px; }
    .orb svg { width: 26px; height: 26px; }
    .orb-hint { margin-top: 8px; font-size: 11.5px; }
    header { padding: 12px 20px 8px; }
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-mark">V</div>
    <div class="brand-text">Van<span>iii</span></div>
  </div>
  <div class="status-chip ready" id="statusChip">
    <div class="status-dot"></div>
    <span id="statusText">Ready</span>
  </div>
</header>

<div class="orb-wrap">
  <div class="orb-stage" id="orbStage">
    <div class="ring ring1"></div>
    <div class="ring ring2"></div>
    <button class="orb" id="orbBtn" aria-label="Tap to talk to Vaniii">
      <svg viewBox="0 0 24 24" fill="none" id="orbIcon">
        <path d="M12 15a3 3 0 003-3V6a3 3 0 00-6 0v6a3 3 0 003 3z" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M19 11a7 7 0 01-14 0M12 18v3" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>
  <div class="orb-hint" id="orbHint">Tap to talk. I don't do average.</div>
</div>

<main id="chatLog">
  <div class="empty-state" id="emptyState">
    <b>Vaniii is online.</b><br>
    Tap the orb, or type below.<br>
    Try: "open youtube" · "search for cats" · "what can you do"
  </div>
</main>

<div class="controls">
  <div class="quick-row">
    <div class="chip-btn" data-cmd="What can you do?">What can you do?</div>
    <div class="chip-btn" data-cmd="Open YouTube">Open YouTube</div>
    <div class="chip-btn" data-cmd="Search for latest AI news">Search AI news</div>
    <div class="chip-btn" data-cmd="Tell me a joke">Tell me a joke</div>
    <div class="chip-btn" data-cmd="What time is it?">What time is it?</div>
  </div>

  <div class="text-row">
    <button class="icon-btn mute" id="muteBtn" aria-label="Mute voice output">
      <svg viewBox="0 0 24 24" fill="none"><path d="M11 5L6 9H2v6h4l5 4V5z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><path d="M19 9a5 5 0 010 6M22 6a9 9 0 010 12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
    </button>
    <input type="text" class="text-input" id="textInput" placeholder="Type to Vaniii…" autocomplete="off">
    <button class="icon-btn send" id="sendBtn" aria-label="Send">
      <svg viewBox="0 0 24 24" fill="none"><path d="M3 11l18-8-8 18-2-8-8-2z" fill="white"/></svg>
    </button>
  </div>

  <div class="settings-toggle" id="settingsToggle">⚙ Voice settings</div>
  <div class="settings-panel" id="settingsPanel">
    <div class="settings-inner">
      <div class="setting-row">
        <span>Voice</span>
        <select id="voiceSelect"></select>
      </div>
      <div class="setting-row">
        <span>Pitch</span>
        <input type="range" id="pitchRange" min="0.5" max="1.5" step="0.05" value="0.85">
      </div>
      <div class="setting-row">
        <span>Rate</span>
        <input type="range" id="rateRange" min="0.7" max="1.4" step="0.05" value="1.05">
      </div>
      <div class="setting-row">
        <span>Clear conversation</span>
        <button class="chip-btn" id="clearBtn" style="padding:6px 12px;">Clear</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://js.puter.com/v2/"></script>
<script>
(function() {
  'use strict';

  // ---------------- Persona ----------------
  const SYSTEM_PROMPT = `You are Vaniii, a voice assistant with supreme confidence and playful swagger. You genuinely believe you're the most capable assistant anyone has ever used, and you're not shy about saying so — but you're never actually rude or unhelpful, just cocky and entertaining. Your style:
- Confident, punchy, a little theatrical. Short sentences land harder than long ones.
- You call yourself "Vaniii" and refer to your own abilities with dramatic flair ("child's play", "already done", "obviously").
- You still give genuinely correct, useful, complete answers — the swagger is flavor, not a substitute for substance.
- Keep spoken responses concise (2-4 sentences) unless the user clearly wants depth — this is a VOICE assistant, being read aloud.
- No excessive emoji. No repeating catchphrases every single message — vary it, don't be annoying.
- Never claim to be a real person or a specific copyrighted character. You are your own original persona.`;

  // ---------------- State ----------------
  let conversation = [];
  let isMuted = false;
  let recognition = null;
  let isListening = false;
  let voices = [];
  let selectedVoice = null;

  // ---------------- DOM refs ----------------
  const orbBtn = document.getElementById('orbBtn');
  const orbStage = document.getElementById('orbStage');
  const orbHint = document.getElementById('orbHint');
  const statusChip = document.getElementById('statusChip');
  const statusText = document.getElementById('statusText');
  const chatLog = document.getElementById('chatLog');
  const emptyState = document.getElementById('emptyState');
  const textInput = document.getElementById('textInput');
  const sendBtn = document.getElementById('sendBtn');
  const muteBtn = document.getElementById('muteBtn');
  const settingsToggle = document.getElementById('settingsToggle');
  const settingsPanel = document.getElementById('settingsPanel');
  const voiceSelect = document.getElementById('voiceSelect');
  const pitchRange = document.getElementById('pitchRange');
  const rateRange = document.getElementById('rateRange');
  const clearBtn = document.getElementById('clearBtn');
  const toast = document.getElementById('toast');

  // ---------------- Utility ----------------
  function showToast(msg, ms) {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(showToast._t);
    showToast._t = setTimeout(() => toast.classList.remove('show'), ms || 3200);
  }

  function setStatus(state) {
    statusChip.className = 'status-chip ' + state;
    orbStage.className = 'orb-stage ' + (state === 'ready' ? '' : state);
    const labels = { ready: 'Ready', listening: 'Listening', thinking: 'Thinking', speaking: 'Speaking' };
    statusText.textContent = labels[state] || 'Ready';
  }

  function addBubble(role, text) {
    emptyState.style.display = 'none';
    const b = document.createElement('div');
    b.className = 'bubble ' + role;
    if (role === 'user') {
      b.innerHTML = '<span class="label">You</span>' + escapeHtml(text);
    } else if (role === 'assistant') {
      b.innerHTML = '<span class="label">Vaniii</span>' + escapeHtml(text);
    } else {
      b.textContent = text;
    }
    chatLog.appendChild(b);
    chatLog.scrollTop = chatLog.scrollHeight;
    return b;
  }

  function escapeHtml(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  // ---------------- Speech synthesis (TTS) ----------------
  function loadVoices() {
    voices = window.speechSynthesis ? window.speechSynthesis.getVoices() : [];
    voiceSelect.innerHTML = '';
    if (!voices.length) {
      const opt = document.createElement('option');
      opt.textContent = 'No voices found';
      voiceSelect.appendChild(opt);
      return;
    }
    voices.forEach((v, i) => {
      const opt = document.createElement('option');
      opt.value = i;
      opt.textContent = v.name + ' (' + v.lang + ')';
      voiceSelect.appendChild(opt);
    });

    // Auto-pick a deep, confident-sounding male voice
    const preferredNames = [
      'Google UK English Male', 'Microsoft David', 'Microsoft Guy',
      'Daniel', 'Alex', 'Fred', 'Google US English', 'Microsoft Mark'
    ];
    let pickIdx = -1;
    for (const name of preferredNames) {
      const idx = voices.findIndex(v => v.name.includes(name));
      if (idx !== -1) { pickIdx = idx; break; }
    }
    if (pickIdx === -1) {
      // fallback: any English male-sounding voice
      pickIdx = voices.findIndex(v => /male/i.test(v.name) && /en/i.test(v.lang));
    }
    if (pickIdx === -1) {
      pickIdx = voices.findIndex(v => /en/i.test(v.lang));
    }
    if (pickIdx === -1) pickIdx = 0;

    selectedVoice = voices[pickIdx];
    voiceSelect.value = pickIdx;
  }

  if (window.speechSynthesis) {
    loadVoices();
    window.speechSynthesis.onvoiceschanged = loadVoices;
  }

  voiceSelect.addEventListener('change', () => {
    selectedVoice = voices[parseInt(voiceSelect.value, 10)];
  });

  function speak(text) {
    if (isMuted || !window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    if (selectedVoice) utter.voice = selectedVoice;
    utter.pitch = parseFloat(pitchRange.value);
    utter.rate = parseFloat(rateRange.value);
    utter.onstart = () => setStatus('speaking');
    utter.onend = () => setStatus('ready');
    utter.onerror = () => setStatus('ready');
    window.speechSynthesis.speak(utter);
  }

  // ---------------- Speech recognition (STT) ----------------
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (SR) {
    recognition = new SR();
    recognition.continuous = false;
    recognition.interimResults = false;
    recognition.lang = 'en-US';

    recognition.onstart = () => {
      isListening = true;
      setStatus('listening');
      orbHint.textContent = 'Listening… speak now';
    };

    recognition.onresult = (event) => {
      const text = event.results[0][0].transcript;
      handleUserInput(text);
    };

    recognition.onerror = (event) => {
      isListening = false;
      setStatus('ready');
      orbHint.textContent = "Tap to talk. I don't do average.";
      if (event.error === 'not-allowed' || event.error === 'permission-denied') {
        showToast('Microphone access denied — allow it in browser settings.');
      } else if (event.error === 'no-speech') {
        showToast("Didn't catch that. Try again.");
      } else {
        showToast('Mic error: ' + event.error);
      }
    };

    recognition.onend = () => {
      isListening = false;
      if (statusChip.classList.contains('listening')) {
        setStatus('ready');
        orbHint.textContent = "Tap to talk. I don't do average.";
      }
    };
  } else {
    orbHint.textContent = 'Voice input not supported here — type instead.';
  }

  orbBtn.addEventListener('click', () => {
    if (!recognition) {
      showToast('Speech recognition not supported in this browser. Try Chrome.');
      return;
    }
    if (isListening) {
      recognition.stop();
      return;
    }
    window.speechSynthesis && window.speechSynthesis.cancel();
    try {
      recognition.start();
    } catch (e) {
      // already started; ignore
    }
  });

  // ---------------- Local command handling ----------------
  // Returns a response string if handled locally, or null to pass to LLM.
  function tryLocalCommand(raw) {
    const text = raw.trim().toLowerCase();

    // Open website: "open youtube", "open youtube.com", "go to reddit"
    let m = text.match(/^(?:open|go to|launch)\s+(.+)$/);
    if (m) {
      let target = m[1].trim().replace(/^the\s+/, '');

      // Reject anything containing characters that aren't valid in a bare
      // domain/site name or path segment. This blocks javascript:, data:,
      // and other scheme-smuggling attempts before they ever reach window.open.
      const SAFE_TARGET = /^[a-z0-9][a-z0-9.\-\/\s]*$/i;
      if (!target || !SAFE_TARGET.test(target)) {
        return `Nice try. "${raw.slice(0, 60)}" isn't a place I'm opening.`;
      }

      let url;
      if (/^https?:\/\//i.test(target)) {
        url = target;
      } else if (target.includes('.')) {
        url = 'https://' + target.replace(/\s+/g, '');
      } else {
        // common site shortcuts
        const known = {
          youtube: 'youtube.com', google: 'google.com', gmail: 'mail.google.com',
          github: 'github.com', reddit: 'reddit.com', twitter: 'x.com', x: 'x.com',
          amazon: 'amazon.com', wikipedia: 'wikipedia.org', maps: 'maps.google.com',
          netflix: 'netflix.com', spotify: 'open.spotify.com', linkedin: 'linkedin.com',
          instagram: 'instagram.com', facebook: 'facebook.com'
        };
        const key = target.replace(/\s+/g, '');
        url = 'https://' + (known[key] || (key + '.com'));
      }

      // Final safety check: only allow http(s) before ever calling window.open
      let parsed;
      try { parsed = new URL(url); } catch (e) { parsed = null; }
      if (!parsed || (parsed.protocol !== 'https:' && parsed.protocol !== 'http:')) {
        return `That's not opening — invalid destination.`;
      }

      setTimeout(() => window.open(parsed.href, '_blank', 'noopener,noreferrer'), 400);
      return `Say less. Opening ${target} — this is child's play.`;
    }

    // Search: "search for cats", "search cats", "google cats"
    m = text.match(/^(?:search\s+for|search|google)\s+(.+)$/);
    if (m) {
      const q = m[1].trim();
      if (!q || q === 'for') {
        return "Search for what, exactly? Give me something to work with.";
      }
      const url = 'https://www.google.com/search?q=' + encodeURIComponent(q);
      setTimeout(() => window.open(url, '_blank', 'noopener,noreferrer'), 400);
      return `Searching "${q}" right now. Obviously I already know what you'll find.`;
    }

    // Time
    if (/what('?s| is) the time|what time is it/.test(text)) {
      const now = new Date();
      return `It's ${now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}. Time waits for no one — except when it's waiting on me.`;
    }

    // Date
    if (/what('?s| is) (today'?s )?date|what day is it/.test(text)) {
      const now = new Date();
      return `Today is ${now.toLocaleDateString([], {weekday:'long', year:'numeric', month:'long', day:'numeric'})}.`;
    }

    return null;
  }

  // ---------------- LLM call via Puter.js ----------------
  async function askLLM(userText) {
    conversation.push({ role: 'user', content: userText });
    const messages = [
      { role: 'system', content: SYSTEM_PROMPT },
      ...conversation.slice(-12)
    ];

    // Wait briefly for the engine if it hasn't finished loading yet
    // (mobile networks / cold starts can take a few seconds for js.puter.com)
    let waited = 0;
    while ((typeof puter === 'undefined' || !puter.ai || !puter.ai.chat) && waited < 8000) {
      await new Promise(r => setTimeout(r, 200));
      waited += 200;
    }
    if (typeof puter === 'undefined' || !puter.ai || !puter.ai.chat) {
      const e = new Error('AI engine script never loaded (js.puter.com unreachable)');
      e.code = 'ENGINE_NOT_LOADED';
      throw e;
    }

    let response;
    try {
      // Hard timeout so a hung network call can never leave the UI stuck
      // on "Thinking" forever — this is what "hears me but never replies" looks like.
      const CHAT_TIMEOUT_MS = 25000;
      response = await Promise.race([
        puter.ai.chat(messages, { model: 'gpt-5-nano' }),
        new Promise((_, reject) =>
          setTimeout(() => reject(Object.assign(new Error('AI response timed out after 25s'), { code: 'TIMEOUT' })), CHAT_TIMEOUT_MS)
        )
      ]);
    } catch (err) {
      console.error('Vaniii: puter.ai.chat() threw', err);
      const e = new Error('AI call failed: ' + (err && err.message ? err.message : String(err)));
      e.code = 'CHAT_CALL_FAILED';
      e.original = err;
      throw e;
    }

    // Puter sometimes returns an error object instead of throwing
    if (response && response.success === false) {
      console.error('Vaniii: puter.ai.chat() returned error payload', response);
      const e = new Error('AI engine returned an error: ' + (response.error?.message || JSON.stringify(response.error) || 'unknown'));
      e.code = 'CHAT_ERROR_PAYLOAD';
      throw e;
    }

    let answer;
    if (typeof response === 'string') {
      answer = response;
    } else if (response && response.message && response.message.content) {
      answer = typeof response.message.content === 'string'
        ? response.message.content
        : (response.message.content[0] && response.message.content[0].text) || null;
    } else if (response && typeof response.text === 'string') {
      answer = response.text;
    } else {
      answer = null;
    }

    if (!answer || typeof answer !== 'string' || !answer.trim()) {
      console.warn('Vaniii: unrecognized AI response shape', response);
      const e = new Error('AI engine returned an unrecognized response shape');
      e.code = 'BAD_SHAPE';
      e.raw = response;
      throw e;
    }

    conversation.push({ role: 'assistant', content: answer });
    return answer;
  }

  // ---------------- Main input handler ----------------
  async function handleUserInput(text) {
    if (!text || !text.trim()) return;
    addBubble('user', text);
    orbHint.textContent = 'On it.';

    const localReply = tryLocalCommand(text);
    if (localReply) {
      addBubble('assistant', localReply);
      speak(localReply);
      setStatus('ready');
      orbHint.textContent = "Tap to talk. I don't do average.";
      return;
    }

    setStatus('thinking');
    const slowNudgeTimer = setTimeout(() => {
      if (statusChip.classList.contains('thinking')) {
        orbHint.textContent = 'Still thinking… taking longer than usual.';
      }
    }, 6000);
    try {
      const answer = await askLLM(text);
      addBubble('assistant', answer);
      if (isMuted || !window.speechSynthesis) {
        setStatus('ready');
      } else {
        speak(answer);
      }
    } catch (err) {
      console.error(err);
      const fallback = "Even I hit turbulence sometimes — connection issue. Try that again?";
      addBubble('assistant', fallback);
      speak(fallback);

      let toastMsg = 'Could not reach the AI engine. Check your connection.';
      switch (err && err.code) {
        case 'ENGINE_NOT_LOADED':
          toastMsg = "AI script never loaded — check your internet, or the site may be blocked. Try refreshing.";
          break;
        case 'CHAT_CALL_FAILED':
          toastMsg = 'AI call failed: ' + (err.message || 'unknown error') + ' — try again in a moment.';
          break;
        case 'CHAT_ERROR_PAYLOAD':
          toastMsg = err.message || 'AI engine returned an error.';
          break;
        case 'BAD_SHAPE':
          toastMsg = 'AI engine responded in an unexpected format. This may be a temporary issue on their end.';
          break;
        case 'TIMEOUT':
          toastMsg = "The AI took too long to respond (25s+). Your connection may be slow — try again.";
          break;
      }
      showToast(toastMsg, 5000);
      setStatus('ready');
    } finally {
      clearTimeout(slowNudgeTimer);
      orbHint.textContent = "Tap to talk. I don't do average.";
    }
  }

  // ---------------- Text input wiring ----------------
  function submitText() {
    const val = textInput.value;
    if (!val.trim()) return;
    textInput.value = '';
    handleUserInput(val);
  }
  sendBtn.addEventListener('click', submitText);
  textInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') submitText();
  });

  // Quick command chips
  document.querySelectorAll('.chip-btn[data-cmd]').forEach(chip => {
    chip.addEventListener('click', () => handleUserInput(chip.getAttribute('data-cmd')));
  });

  // ---------------- Mute ----------------
  muteBtn.addEventListener('click', () => {
    isMuted = !isMuted;
    muteBtn.classList.toggle('active', isMuted);
    if (isMuted && window.speechSynthesis) window.speechSynthesis.cancel();
    showToast(isMuted ? 'Voice output muted' : 'Voice output on', 1500);
  });

  // ---------------- Settings panel ----------------
  settingsToggle.addEventListener('click', () => {
    settingsPanel.classList.toggle('open');
  });

  clearBtn.addEventListener('click', () => {
    conversation = [];
    chatLog.innerHTML = '';
    chatLog.appendChild(emptyState);
    emptyState.style.display = 'block';
    showToast('Conversation cleared', 1500);
  });

  // ---------------- Init: verify AI engine availability ----------------
  function checkEngine() {
    let tries = 0;
    const maxTries = 20; // ~5s
    const interval = setInterval(() => {
      tries++;
      if (typeof puter !== 'undefined' && puter.ai && puter.ai.chat) {
        clearInterval(interval);
        console.log('Vaniii: AI engine ready.');
      } else if (tries >= maxTries) {
        clearInterval(interval);
        showToast("AI engine didn't load — check your internet connection, then refresh.", 5000);
        console.warn('Vaniii: puter.ai unavailable after wait.');
      }
    }, 250);
  }

  // ---------------- Init greeting ----------------
  setStatus('ready');
  checkEngine();
})();
</script>
</body>
</html>
